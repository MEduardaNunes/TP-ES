{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planify — Login</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/accounts.css' %}" />
  </head>
  <body>
    <div class="page-shell">

      <header>
        <h1>Planify</h1>
      </header>

      {% if messages %}
        {% for message in messages %}
          <div class="toast {{ message.tags }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <script>
        setTimeout(() => {
          document.querySelectorAll('.toast').forEach(el => {
            el.style.opacity = "0";
            setTimeout(() => el.remove(), 500);
          });
        }, 3000);
      </script>

      <main class="forms-grid">
        
        <section class="panel">
          <h2>Já sou usuário</h2>
          <form method="POST" action="{% url 'accounts:login_user' %}">
            {% csrf_token %}
            <label for="login-name">Nome</label>
            <input type="text" id="login-name" name="username" placeholder="Seu nome" required />
            <label for="login-password">Senha</label>
            <input type="password" id="login-password" name="password" placeholder="Senha" required />
            <button class="button" type="submit">Entrar</button>
          </form>
        </section>
        
        <div class="center-line">
          <a href="/sign-up/">Criar nova conta</a>
        </div>
      </main>
    </div>
  </body>
</html>
